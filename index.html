<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Messaging Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<script type="text/javascript">

const CHAT_DISABLED_KEY = 'chatDisabled';

/* =========================================================
   INIT EMBEDDED MESSAGING
========================================================= */
function initEmbeddedMessaging() {
    try {
        embeddedservice_bootstrap.settings.language = 'en_US';

        /* 🔹 LISTEN FOR USER MESSAGE */
        window.addEventListener("onEmbeddedMessageSent", (event) => {
            try {
                const payload = JSON.parse(event.detail.conversationEntry.entryPayload);
                const messageText = payload?.abstractMessage?.staticContent?.text;

                console.log('User Message:', messageText);

                /* ✅ YOUR CONDITION */
                if (messageText === 'Yoo Yashi') {
                    console.log('Trigger matched → disabling input');

                    // Store flag
                    localStorage.setItem(CHAT_DISABLED_KEY, 'true');

                    // Disable input box
                    const textarea = document.querySelector('.embeddedMessagingInputFooterTextArea');
                if (textarea) {
                    textarea.disabled = true;
                }
                }

            } catch (e) {
                console.error('Error parsing payload:', e);
            }
        });

        embeddedservice_bootstrap.init(
            '00DPv00000Cbjth',
            'HS_Live_Chat',
            'https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060',
            {
                scrt2URL: 'https://hsiuk--fullcopy.sandbox.my.salesforce-scrt.com'
            }
        );

    } catch (err) {
        console.error('Error loading Embedded Messaging:', err);
    }
}


/* =========================================================
   ON READY → HANDLE SESSION RESET LOGIC
========================================================= */
window.addEventListener("onEmbeddedMessagingReady", () => {
    console.log("Embedded Messaging Ready");

    const isDisabled = localStorage.getItem(CHAT_DISABLED_KEY);

    /* 🔥 ONLY SPECIAL CASE */
    if (isDisabled === 'true') {
        console.log('Chat was disabled → restarting session');

        try {
            embeddedservice_bootstrap.userVerificationAPI.clearSession(true);

            // Remove flag to avoid loop
            localStorage.removeItem(CHAT_DISABLED_KEY);

        } catch (e) {
            console.error('Session reset failed:', e);
        }

        return;
    }

    /* ✅ NORMAL FLOW (NO CHANGE) */
    embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
        "Brand": "Kent"
    });

});


</script>

<!-- Salesforce Script -->
<script 
type="text/javascript"
src="https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060/assets/js/bootstrap.min.js"
onload="initEmbeddedMessaging()">
</script>

</body>
</html>
