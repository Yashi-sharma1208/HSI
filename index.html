<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Messaging Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Fallback: disable typing (may not always work due to shadow DOM) */
        textarea.embeddedMessagingInputFooterTextArea {
            pointer-events: none;
        }
    </style>

</head>
<body>

<script type="text/javascript">

function hideFooter() {
    try {
        const container = document.querySelector('embeddedservice-messaging');

        if (!container) return;

        const shadow1 = container.shadowRoot;
        if (!shadow1) return;

        const conversation = shadow1.querySelector('embeddedmessaging-conversation-state');
        if (!conversation) return;

        const shadow2 = conversation.shadowRoot;
        if (!shadow2) return;

        const footer = shadow2.querySelector('.footerItemsContainer');

        if (footer) {
            footer.style.display = 'none';
            console.log('✅ Footer hidden');
        }

    } catch (e) {
        console.log('Error in hideFooter:', e);
    }
}

function startPersistentHiding() {
    const observer = new MutationObserver(() => {
        hideFooter();
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });

    console.log('👀 MutationObserver started');
}

function initEmbeddedMessaging() {
    try {
        embeddedservice_bootstrap.settings.language = 'en_US';

        window.addEventListener("onEmbeddedMessageSent", (event) => {
            const payload = JSON.parse(event.detail.conversationEntry.entryPayload);
            const messageText = payload.abstractMessage?.staticContent?.text;

            console.log("Message detected:", messageText);

            if (messageText === 'Yoo Yashi') {
                console.log('🎯 Trigger condition matched');

                // Wait for UI to render
                setTimeout(() => {
                    hideFooter();
                    startPersistentHiding();
                }, 2000);
            }
        });

        embeddedservice_bootstrap.init(
            '00DPv00000Cbjth',
            'HS_Live_Chat',
            'https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060',
            {
                scrt2URL: 'https://hsiuk--fullcopy.sandbox.my.salesforce-scrt.com'
            }
        );

    } catch (err) {
        console.error('Error loading Embedded Messaging:', err);
    }
}

</script>

<script
    type="text/javascript"
    src="https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060/assets/js/bootstrap.min.js"
    onload="initEmbeddedMessaging()">
</script>

</body>
</html>
