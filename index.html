<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Messaging Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<script type="text/javascript">

// ✅ Get textarea from Shadow DOM
function getTextareaFromShadow() {
    const messagingComponent = document.querySelector('embeddedservice-messaging');
    if (!messagingComponent) return null;

    let shadow = messagingComponent.shadowRoot;
    if (!shadow) return null;

    // Traverse deeper if needed
    let textarea = shadow.querySelector('textarea');

    // Some orgs nest deeper → try recursive search
    if (!textarea) {
        const allElements = shadow.querySelectorAll('*');
        for (let el of allElements) {
            if (el.shadowRoot) {
                textarea = el.shadowRoot.querySelector('textarea');
                if (textarea) break;
            }
        }
    }

    return textarea;
}


// ✅ Retry + disable
function waitAndDisableInput() {
    let attempts = 0;
    const maxAttempts = 25;

    const interval = setInterval(() => {
        const textarea = getTextareaFromShadow();

        if (textarea) {
            textarea.disabled = true;
            textarea.setAttribute('aria-disabled', 'true');
            textarea.style.opacity = '0.5';

            console.log('Textarea found in shadow DOM and disabled');
            clearInterval(interval);
            return;
        }

        attempts++;

        if (attempts >= maxAttempts) {
            console.log('Textarea not found even in shadow DOM');
            clearInterval(interval);
        }
    }, 300);
}


// ✅ Persist after re-render
function disableInputPersistently() {
    const observer = new MutationObserver(() => {
        const textarea = getTextareaFromShadow();

        if (textarea && !textarea.disabled) {
            textarea.disabled = true;
            textarea.setAttribute('aria-disabled', 'true');
            textarea.style.opacity = '0.5';

            console.log('Re-applied disable inside shadow DOM');
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
}


// ✅ Ready event
window.addEventListener("onEmbeddedMessagingReady", () => {
    console.log("Embedded Messaging Ready");

    embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
        "Brand": "Kent"
    });
});


// ✅ Init
function initEmbeddedMessaging() {
    try {
        embeddedservice_bootstrap.settings.language = 'en_US';

        window.addEventListener("onEmbeddedMessageSent", (event) => {
            const payload = JSON.parse(event.detail.conversationEntry.entryPayload);
            const messageText = payload.abstractMessage?.staticContent?.text;

            console.log("Message detected:", messageText);

            if (messageText === 'Yoo Yashi') {
                console.log('Trigger condition matched');

                waitAndDisableInput();
                disableInputPersistently();
            }
        });

        embeddedservice_bootstrap.init(
            '00DPv00000Cbjth',
            'HS_Live_Chat',
            'https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060',
            {
                scrt2URL: 'https://hsiuk--fullcopy.sandbox.my.salesforce-scrt.com'
            }
        );

    } catch (err) {
        console.error('Error loading Embedded Messaging:', err);
    }
}

</script>

<script
    type="text/javascript"
    src="https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060/assets/js/bootstrap.min.js"
    onload="initEmbeddedMessaging()">
</script>

</body>
</html>
