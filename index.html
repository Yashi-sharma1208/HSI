<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Messaging Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<script type="text/javascript">

// ✅ Retry until textarea appears
function waitAndDisableInput() {
    let attempts = 0;
    const maxAttempts = 20;

    const interval = setInterval(() => {
        const textarea = document.querySelector('.embeddedMessagingInputFooterTextArea, textarea');

        if (textarea) {
            textarea.disabled = true;
            textarea.setAttribute('aria-disabled', 'true');
            textarea.style.opacity = '0.5';

            console.log('Textarea found and disabled');
            clearInterval(interval);
            return;
        }

        attempts++;

        if (attempts >= maxAttempts) {
            console.log('Textarea not found after retries');
            clearInterval(interval);
        }
    }, 300);
}


// ✅ Keep it disabled even after Salesforce re-render
function disableInputPersistently() {
    const observer = new MutationObserver(() => {
        const textarea = document.querySelector('.embeddedMessagingInputFooterTextArea, textarea');

        if (textarea && !textarea.disabled) {
            textarea.disabled = true;
            textarea.setAttribute('aria-disabled', 'true');
            textarea.style.opacity = '0.5';

            console.log('Re-applied disable after re-render');
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
}


// ✅ Embedded Messaging Ready
window.addEventListener("onEmbeddedMessagingReady", () => {
    console.log("Embedded Messaging Ready");

    embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
        "Brand": "Kent"
    });
});


// ✅ Init
function initEmbeddedMessaging() {
    try {
        embeddedservice_bootstrap.settings.language = 'en_US';

        // ✅ Listen for messages
        window.addEventListener("onEmbeddedMessageSent", (event) => {
            const payload = JSON.parse(event.detail.conversationEntry.entryPayload);
            const messageText = payload.abstractMessage?.staticContent?.text;

            console.log("Message detected:", messageText);

            if (messageText === 'Yoo Yashi') {
                console.log('Trigger condition matched');

                // ✅ Wait + disable
                waitAndDisableInput();

                // ✅ Persist disable
                disableInputPersistently();
            }
        });

        embeddedservice_bootstrap.init(
            '00DPv00000Cbjth',
            'HS_Live_Chat',
            'https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060',
            {
                scrt2URL: 'https://hsiuk--fullcopy.sandbox.my.salesforce-scrt.com'
            }
        );

    } catch (err) {
        console.error('Error loading Embedded Messaging:', err);
    }
}

</script>

<script
    type="text/javascript"
    src="https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060/assets/js/bootstrap.min.js"
    onload="initEmbeddedMessaging()">
</script>

</body>
</html>
