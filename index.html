<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Messaging Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<script type="text/javascript">

    function disableInputArea() {
        const checkInterval = setInterval(() => {

            // Step 1: Find the <embeddedmessaging-input-footer> custom element
            const inputFooter = document.querySelector('embeddedmessaging-input-footer');
            if (!inputFooter || !inputFooter.shadowRoot) return;

            // Step 2: Traverse deeper — find the textarea wrapper div inside shadow root
            const textAreaWrapper = inputFooter.shadowRoot.querySelector('.embeddedMessagingInputTextAreaWrapper');
            if (!textAreaWrapper) return;

            // Step 3: Get the actual textarea inside the wrapper
            const textarea = textAreaWrapper.querySelector('textarea.embeddedMessagingInputFooterTextArea');
            if (!textarea) return;

            // ✅ Disable the textarea
            textarea.setAttribute('aria-disabled', 'true');
            textarea.disabled = true;
            textarea.readOnly = true;
            textarea.placeholder = 'This conversation has ended.';
            textarea.style.pointerEvents = 'none';
            textarea.style.opacity = '0.55';
            textarea.style.cursor = 'not-allowed';
            textarea.style.backgroundColor = '#f3f3f3';

            // Step 4: Also disable the send/attachment buttons inside footerItemsContainer
            const footerContainer = inputFooter.shadowRoot.querySelector('.footerItemsContainer');
            if (footerContainer) {
                footerContainer.querySelectorAll('button').forEach(btn => {
                    btn.disabled = true;
                    btn.style.pointerEvents = 'none';
                    btn.style.opacity = '0.4';
                });
            }

            clearInterval(checkInterval);
            console.log('[EmbeddedMsg] Input area successfully disabled.');

        }, 300);

        // Safety cleanup after 15 seconds
        setTimeout(() => clearInterval(checkInterval), 15000);
    }


    function initEmbeddedMessaging() {
        try {
            embeddedservice_bootstrap.settings.language = 'en_US';

            // Listen for incoming messages from Agentforce / human agent
            window.addEventListener("onEmbeddedMessagingConversationEntryAdded", (event) => {
                try {
                    const entry = event.detail?.conversationEntry;
                    if (!entry) return;

                    const payload = JSON.parse(entry.entryPayload);
                    const senderRole = entry.sender?.role; // 'Chatbot', 'Agent', 'System'
                    const messageText = payload?.abstractMessage?.staticContent?.text || '';

                    console.log(`[EmbeddedMsg] ${senderRole}: "${messageText}"`);

                    // Trigger on "thank you" from bot or agent only
                    if (
                        (senderRole === 'Chatbot' || senderRole === 'Agent') &&
                        messageText.toLowerCase().includes('thank you')
                    ) {
                        console.log('[EmbeddedMsg] "Thank you" detected — disabling input...');
                        disableInputArea();
                    }

                } catch (parseErr) {
                    console.error('[EmbeddedMsg] Error parsing entry:', parseErr);
                }
            });

            embeddedservice_bootstrap.init(
                '00DPv00000Cbjth',
                'HS_Live_Chat',
                'https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060',
                {
                    scrt2URL: 'https://hsiuk--fullcopy.sandbox.my.salesforce-scrt.com'
                }
            );

        } catch (err) {
            console.error('[EmbeddedMsg] Bootstrap error:', err);
        }
    }

</script>

<script
    type="text/javascript"
    src="https://hsiuk--fullcopy.sandbox.my.site.com/ESWHSLiveChat1769933410060/assets/js/bootstrap.min.js"
    onload="initEmbeddedMessaging()">
</script>

</body>
</html>
