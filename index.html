<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disable LWC Textarea</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Disable typing + clicking */
    textarea.embeddedMessagingInputFooterTextArea {
      pointer-events: none !important;
      background-color: #f5f5f5 !important;
      cursor: not-allowed !important;
      opacity: 0.6;
    }
  </style>

</head>
<body>

  <webruntime-app>
    <lwr-router-container>

      <webruntime-inner-app>

        <embedded_service_iframe-iframe-wrapper>
          <webruntime-router-container>

            <embedded_service_iframe-frame-layout>

              <embeddedmessaging-container dir="ltr">

                <!-- HEADER -->
                <embeddedmessaging-chat-header>
                  <header class="chatHeader">
                    <button class="menuButton">⋮</button>
                    <h2 class="headerText">Chat</h2>
                    <button class="minimizeButton">⌄</button>
                  </header>
                </embeddedmessaging-chat-header>

                <!-- CONVERSATION -->
                <embeddedmessaging-conversation-state>

                  <embeddedmessaging-conversation-log>
                    <section class="slds-chat">
                      <ul class="slds-chat-list">
                        <li class="system-message">
                          Thanks! Let us know how we can help...
                        </li>
                      </ul>
                    </section>
                  </embeddedmessaging-conversation-log>

                  <!-- INPUT FOOTER -->
                  <embeddedmessaging-input-footer>
                    <div class="footerItemsContainer">

                      <div class="fileAttachmentButtonWrapper">
                        <input type="file" class="fileAttachmentButtonInput" multiple />
                      </div>

                      <div class="embeddedMessagingInputTextAreaWrapper">
                        <textarea
                          class="embeddedMessagingInputFooterTextArea"
                          placeholder="Start a new chat..."
                          rows="1"
                        ></textarea>
                      </div>

                    </div>
                  </embeddedmessaging-input-footer>

                </embeddedmessaging-conversation-state>

              </embeddedmessaging-container>

            </embedded_service_iframe-frame-layout>

          </webruntime-router-container>
        </embedded_service_iframe-iframe-wrapper>

      </webruntime-inner-app>

    </lwr-router-container>
  </webruntime-app>

</body>
</html>
